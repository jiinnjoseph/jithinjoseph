<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user-register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<style>
    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }


    :root {
        --blue: #3a6ee8;
        --blue-light: #eef1f8;
        --blue-circle: #d8e1f5;
        --panel-bg: #5d6b8a;
        --white: #ffffff;
        --text-dark: #58595b;
        --text-muted: #797e8a;
        --text-lighter: #a0aec0;
        --border: #dde2ef;
        --radius-sm: 14px;
        --radius-md: 12px;
        --radius-lg: 14px;
        --sidebar-width: 260px;
    }

    body {
        font-family: 'Inter', sans-serif;
        height: 100vh;
        display: flex;
        background: var(--blue-light);
    }

    .dasboard-container {

        display: flex;
        width: 100%;
        min-height: 100vh;

    }

    .sidebar {
        width: var(--sidebar-width);
        background: var(--blue-light);
        top: 0;
        left: 0;
        bottom: 0;
        position: absolute;
        display: flex;
        flex-direction: column;
        padding: 32px 24px;
        z-index: 10;
        overflow: hidden;
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
    }


    .sidebar::before {
        content: '';
        position: absolute;
        top: -70px;
        left: -70px;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: var(--blue-circle);
        pointer-events: none;
    }

    .sidebar::after {
        content: '';
        position: absolute;
        bottom: -80px;
        right: -60px;
        width: 210px;
        height: 210px;
        border-radius: 50%;
        background: var(--blue-circle);
        pointer-events: none;
    }


    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
        position: relative;
        z-index: 1;
        margin-top: 10px;

    }

    .logo i {
        font-size: 22px;
        color: var(--blue);
        font-size: 30px;
    }

    .logo h1 {
        font-size: 20px;
        font-weight: 700;
        color: var(--blue);
        letter-spacing: -0.5px;
        font-size: 30px;
    }


    .sidebar p {
        position: relative;
        display: flex;
        flex-direction: column;
        color: var(--panel-bg);
        margin: 0;
        font-size: 14px;
        margin-top: 9px;
    }

    .dashboard-tabs {

        padding: 10px;
        border-radius: 14px 12px;
        position: relative;
        margin-bottom: 28px;
        line-height: 35px;
        margin-top: 80px;
        margin-left: 15px;
        gap: 10px;
        box-shadow: 0px 10px 30px rgb(32, 32, 32);

    }

    h3 i {
        margin-right: 13px;
    }

    .dashboard-tabs h3 {
        background-color: rgb(147, 19, 162);
        font-size: 14px;
        font-weight: bold;
        color: var(--text-dark);
        letter-spacing: 0.8px;
        padding: 0 4px;
        cursor: default;
        margin-right: 3px;
        transition: 0.3s;
    }


    .dashboard-tabs i {
        margin-left: 3px;
    }

    .dashboard-tabs button {
        border: none;
        transition: 0.3s;
        background-color: transparent;
        font-family: 'Inter', sans-serif;
    }


    .dashboard-tabs h3:hover {

        background-color: white;
        padding: 10px 10px;
        color: #3a6ee8;
        border-radius: 18px 18px;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(58, 110, 232, 0.15);

    }

    .dashboard-menu {
        display: none;
        flex-direction: column;
        margin-top: 50px;
        animation: slideDown 0.3s ease;


    }

    .dashboard-menu.show {
        display: flex;
    }

    .dashboard-toggle {
        cursor: pointer;
        margin-top: 50px;
    }

    .dashboard-toggle h3 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text-dark);
    }

    .dashboard-menu button {
        width: 100%;
        padding: 18px;
        margin: 5px 0;
        border: blue;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s;
        color: var(--text-dark);
        background-color: #ccdff7;
    }

    .dashboard-menu button:hover {
        transform: translateX(5px);
        color: #3a6ee8;
        background-color: white;
    }

    .arrow {
        transition: 0.3s;
    }

    .arrow.rotate {
        transform: rotate(180deg);
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .left-bottom {
        position: absolute;
        z-index: 1;
        margin-bottom: 100px;
    }

    .card-title h3 {
        font-size: 35px;
        color: #2d73f4;
        margin-top: 3px;
        text-align: center;
        padding-bottom: 30px;

    }

    .left-bottom p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.7;
    }

    .home-btn {
        display: flex;
        gap: 8px;
        padding: 14px 14px;
        background: var(--text-lighter);
        border: 1.5px solid var(--border);
        border-radius: 20px;
        font-size: 13px;
        color: white;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        transition: 0.3s;
        width: 60%;
        margin-top: 550px;
        position: relative;
        z-index: 1;
        transition: 0.3s;
        text-decoration: none;
        align-items: center;
        margin-left: 40px;
    }

    .home-btn i {
        padding-left: 20px;
        font-size: 13px;
    }

    .home-btn:hover {
        background-color: var(--blue);
        color: white;
        transform: translateY(-6px);
    }

    .right-panel {
        flex: 1;
        background: var(--blue-light);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 30px;
        margin-left: 500px;
    }


    .form-card {

        height: vh;
        padding: 18px 38px;
        margin-left: 100px;
        width: 450px;
        display: flex;
        flex-direction: column;
        background: white;
        border-radius: 24px;
        box-shadow: 0px 10px 35px rgb(32, 32, 32);
        position: relative;
        z-index: 2;
        margin-top: 50px;
        transform: scale(0.9);
        transform-origin: top center;
        gap: 5px;
        padding-bottom: 50px;

    }

    .left-bottom h2 {
        font-size: 35px;
        color: white;
        margin-top: 3px;
        text-align: center;
    }

    .subtitle {
        color: #64748b;
        margin-bottom: 20px;
        line-height: 1.8;
    }


    form label {
        margin-bottom: 8px;
        color: #334155;
        font-weight: 600;
        font-size: 14px;
        padding: 18px 18px;

    }


    form input,
    form select {
        border: 1px solid #dbe2ea;
        border-radius: 12px;
        background: #f8fafc;
        padding: 10px 10px;
        font-size: 15px;
        transition: 0.3s ease;
        margin-bottom: 4px;
        margin-top: 15px;

    }


    form input:focus,
    form select:focus {
        outline: none;
        border-color: #2563eb;
        background: white;
        transform: scale(1.02);
        box-shadow: 0px 0px 0px 4px rgba(10, 66, 188, 0.12);
    }


    .fuel-submit {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 14px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.35s ease;
        margin-top: 30px;
    }


    .fuel-submit:hover {
        background: #153690;
        transform: translateY(-3px);
        box-shadow: 0px 12px 25px rgba(37, 99, 235, 0.25);
    }

    .fuel-submit:active {
        transform: scale(0.98);
    }
</style>
<script>
    function toggleMenu() {
        const menu = document.getElementById("dashboardMenu");
        const arrow = document.querySelector(".arrow");

        menu.classList.toggle("show");
        arrow.classList.toggle("rotate");
    }
</script>

<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-road"></i>
                <h1>RoadAssist</h1>
            </div>
            <p>Emergency fuel & roadside assistance</p>
            <div class="dashboard-labs">

                <div class="dashboard-toggle" onclick="toggleMenu()">
                    <h3>
                        <i class="fa-solid fa-bars"></i> Dashboard
                        <i class="fa-solid fa-chevron-down arrow"></i>
                    </h3>
                </div>
                <div class="dashboard-menu" id="dashboardMenu">
                    <a href="/roadapp/fuelregister/">
                        <button>
                            <h3><i class="fa-solid fa-gas-pump"></i> Emergency Fuel</h3>
                        </button>
                    </a>
                    <a href="/roadapp/servicerequest/">
                        <button>
                            <h3><i class="fa-solid fa-wrench"></i> Services</h3>
                        </button>
                    </a>
                    <a href="/roadapp/custom_fuelview/">
                        <button>
                            <h3><i class="fa-solid fa-droplet"></i> Fuel Requests</h3>
                        </button>
                    </a>
                    <a href="/roadapp/custom_serviceview/">
                        <button>
                            <h3><i class="fa-solid fa-clipboard-list"></i> Services History</h3>
                        </button>
                    </a>
                </div>
                <a href="/roadapp/user-page/" class="home-btn"><i class="fa-solid fa-house"></i>Home</a>
            </div>
        </div>
        <div class="right-panel">
            <div class="form-card">
                <div class="card-title">
                    <h3><strong>Fuel Request</strong></Fuel>
                    </h3>
                </div>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ x }}
                    <button type="submit" class="fuel-submit">submit</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.dataset.target;
                const submenu = document.getElementById(targetId);
                const isOpen = submenu.classList.contains('open');

                document.querySelectorAll('.submenu').forEach(s => s.classList.remove('open'));
                document.querySelectorAll('.menu-btn').forEach(b => {
                    b.classList.remove('active', 'open');
                    b.querySelector('i.fa-angle-right').style.transform = '';
                });

                if (!isOpen) {
                    submenu.classList.add('open');
                    this.classList.add('active', 'open');
                }
            });
        });

        function toggleCard(id) {
            const card = document.getElementById(id);
            card.classList.toggle('open');
        }
    </script>
</body>
</html>
