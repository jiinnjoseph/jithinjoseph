{% load static %}


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create account</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
        --blue: #3a6ee8;
        --blue-light: #eef1f8;
        --blue-circle: #d8e1f5;
        --panel-bg: #5d6b8a;
        --white: #ffffff;
        --text-dark: #2d3748;
        --text-muted: #797e8a;
        --text-lighter: #a0aec0;
        --border: #dde2ef;
        --radius-sm: 14px;
        --radius-md: 12px;
        --radius-lg: 14px;
        --sidebar-width: 260px;

        }


        body {
            font-family: Consolas, sans-serif;
            background: #f4f7fb;

        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .top-content{
            margin-left:30px;
        }

        .image-section {
            width: 55%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .logo {
            
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            color: #2d73f4;
            font-size: 28px;
        }

        .logo h1 {
            margin: 0;
            color: #2d73f4;
            font-size: 42px;
            font-weight: bold;
        }


        .tagline {
            margin-top: 10px;
            font-size: 20px;
            width: 500px;
            color: var(--text-muted);
        }

        .image-box {
            position: relative;
            width: 100%;
            height:fit-content;
        }

        .image-box img {
            margin-top:10px;
            width: 100%;
            height:83vh;
            margin-bottom:20px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgb(140, 139, 139);
            display: block;
        
        }

        .signup-box {

            height: 100vh;
            padding: 20px 20px;
            margin-left: 10px;
            width: 450px;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 24px;
            box-shadow: 0px 10px 35px rgb(32, 32, 32);
            position: relative;
            z-index: 1;
            margin-top: 50px;
            transform: scale(0.9);
            transform-origin: top center;
            margin-left:50px;

        }

        .signup-box h1 {
            font-size: 35px;
            color: #2d73f4;
            margin-top: 3px;
            text-align: center;
        }

        .signup-box form p {
            margin: 8px 0;

        }

        form p {
            display: flex;
            flex-direction: column;
        }

        form label {
            margin-bottom: 8px;
            color: #334155;
            font-weight: 600;
            font-size: 14px;
        }


        form input,
        form select {
            border: 1px solid #dbe2ea;
            border-radius: 12px;
            background: #f8fafc;
            padding: 9px;
            font-size: 15px;
            transition: 0.3s ease;
            margin-bottom: 4px;
        }

        form input:focus,
        form select:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
            transform: scale(1.02);
            box-shadow: 0px 0px 0px 4px rgba(37, 99, 235, 0.12);
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 14px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.35s ease;
            margin-top: 1px;
        }

        .signup-btn:hover {
            background: #153690;
            transform: translateY(-3px);
            box-shadow: 0px 12px 25px rgba(37, 99, 235, 0.25);
        }

        .signup-btn:active {
            transform: scale(0.98);
        }

        .login-link {
            margin-top: 8px;
            text-align: center;
            color: #64748b;

        }

        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            margin-top:2px;
        }

        .login-link a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }

        .errorlist {
            list-style: none;
            color: #dc2626;
            font-size: 13px;
            margin-bottom: 8px;
        }


        @keyframes float {

            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(25px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes float2 {

            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @media(max-width: 950px) {

            .image-section {
                display: none;
            }

            .signup-section {
                width: 100%;
                padding: 30px;
            }

            .signup-box {
                width: 100%;
                max-width: 450px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="image-section">
            <div class="top-content">
                <div class="logo">
                    <i class="fa-solid fa-road"></i>
                    <h1>RoadAssist</h1>
                </div>
                <p class="tagline">
                    Emergency fuel & roadside assistance
                </p>
            </div>
            <div class="image-box">
                <img src="/media/signup.jpg" alt=""> 
            </div>
        </div>
        <div class="signup-box">
            <form method="POST">
                <h1><strong>Create new account</strong></h1>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="signup-btn">create account</button>
            </form>
            <div class="login-link">
                Already have an account?
                <a href="/roadapp/login_page/">Login</a>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
