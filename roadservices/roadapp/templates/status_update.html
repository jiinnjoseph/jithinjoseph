<!DOCTYPE html>
<html>

<head>
    <title>Update Status</title>
</head>

<body>

    <h2>Update Work Status</h2>

    <form method="POST">

        {% csrf_token %}

        <select name="status">
            <option value="pending">
                pending
            </option>

            <option value="in progress">
                In Progress
            </option>

            <option value="completed">
                Completed
            </option>

        </select>

        <button type="submit">
            Update
        </button>
    </form>

</body>

</html>
